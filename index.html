<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Pro: Fixed</title>
    <style>
        :root {
            --bg: #05010a;
            --grid: #150526;
            --snake: #00f2ff;
            --food: #ff007b;
            --text: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border: 3px solid var(--grid);
            background: var(--bg);
        }

        canvas { display: block; }

        .header { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 6px; color: var(--snake); text-shadow: 0 0 10px var(--snake); }
        .stats { display: flex; gap: 20px; font-size: 0.9rem; margin-top: 10px; color: #888; justify-content: center; }
        b { color: var(--text); }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 1, 10, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--snake);
            color: var(--snake);
            padding: 12px 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn:hover { background: var(--snake); color: var(--bg); }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEON SNAKE</h1>
        <div class="stats">
            <span>SCORE: <b id="score">0</b></span>
            <span>BEST: <b id="best">0</b></span>
        </div>
    </div>

    <div class="game-container">
        <canvas id="game" width="400" height="400"></canvas>
        <div id="overlay">
            <h2 style="color: var(--food); letter-spacing: 3px;">CRASHED</h2>
            <button class="btn" onclick="resetGame()">REBOOT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const bestEl = document.getElementById("best");
        const overlay = document.getElementById("overlay");

        const box = 20;
        let score = 0;
        let best = localStorage.getItem("snakeBest") || 0;
        bestEl.innerText = best;

        let snake, food, d, game;

        function init() {
            snake = [{x: 10 * box, y: 10 * box}];
            food = {
                x: Math.floor(Math.random() * 19) * box,
                y: Math.floor(Math.random() * 19) * box
            };
            d = "";
            score = 0;
            scoreEl.innerText = score;
            overlay.style.display = "none";
            if (game) clearInterval(game);
            game = setInterval(draw, 100);
        }

        document.addEventListener("keydown", (e) => {
            if((e.keyCode == 37 || e.keyCode == 65) && d != "RIGHT") d = "LEFT";
            else if((e.keyCode == 38 || e.keyCode == 87) && d != "DOWN") d = "UP";
            else if((e.keyCode == 39 || e.keyCode == 68) && d != "LEFT") d = "RIGHT";
            else if((e.keyCode == 40 || e.keyCode == 83) && d != "UP") d = "DOWN";
        });

        function draw() {
            ctx.fillStyle = "#05010a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff007b";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/3, 0, Math.PI*2);
            ctx.fill();

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2ff" : "#00667a";
                ctx.fillRect(snake[i].x, snake[i].y, box-1, box-1);
            }

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreEl.innerText = score;
                food = {
                    x: Math.floor(Math.random() * 19) * box,
                    y: Math.floor(Math.random() * 19) * box
                };
            } else if (d != "") {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(d != "") {
                if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                    clearInterval(game);
                    if(score > best) {
                        best = score;
                        localStorage.setItem("snakeBest", best);
                        bestEl.innerText = best;
                    }
                    overlay.style.display = "flex";
                }
                snake.unshift(newHead);
            }
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function resetGame() { init(); }

        init();
    </script>
</body>
</html>
